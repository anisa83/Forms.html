<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>HTML Forms</title>

    <style>
        body {
            font-family: Arial;
        }

        .box {
            border: 2px solid black;
            width: 300px;
            padding: 15px;
            margin-bottom: 20px;
        }

        input {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<h2>1. Login Form</h2>
<div class="box">
    <form>
        Login:<br>
        <input type="text"><br>

        Parol:<br>
        <input type="password"><br>

        <button>Kiriw</button>
    </form>
</div>

<h2>2. Student/Jumisshi</h2>
<div class="box">
    <form>
        <b>Házir islemiz yamasa oqiymiz?</b><br><br>

        <input type="radio" name="status"> Oquwshi<br>
        <input type="radio" name="status"> Student<br>
        <input type="radio" name="status"> Jumisshi<br>
    </form>
</div>

<h2>3. Personal Info</h2>
<div class="box">
    <form>
        Atınız:<br>
        <input type="text"><br>

        Jasıñız:<br>
        <input type="number"><br>

        Jinsiñiz:<br>
        <input type="radio" name="gender"> Erkek
        <input type="radio" name="gender"> Hayal<br><br>

        <button>Jiberiw</button>
        <button type="reset">Tazalaw</button>
    </form>
</div>

<h2>4. Tillar</h2>
<div class="box">
    <form>
        <b>Qaysi tillarni bilasiz?</b><br><br>

        <input type="checkbox"> Ozbek tili<br>
        <input type="checkbox"> Ingliz tili<br>
        <input type="checkbox"> Rus tili<br><br>

        <button type="reset">Tazalaw</button>
    </form>
</div>

<h2>5. Izlew</h2>
<div class="box">
    <form>
        Sayttan izlew:
        <input type="text">
        <button>🔍</button>
    </form>
</div>

</body>
</html>
